<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Showroom Motor Sport</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial, sans-serif;
    }

    .card:hover{
      transform:scale(1.03);
      transition:0.3s;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="bg-black p-5 shadow-lg">

    <h1 class="text-4xl font-bold text-center text-red-500">
      SHOWROOM MOTOR SPORT
    </h1>

    <p class="text-center text-gray-300 mt-2">
      Penjualan Motor Sport Terbaik
    </p>

  </header>

  <!-- LIST MOTOR -->
  <section class="max-w-7xl mx-auto p-6">

    <div class="grid md:grid-cols-3 gap-6">

      <!-- MOTOR 1 -->
      <div class="card bg-slate-800 rounded-2xl overflow-hidden shadow-lg">

        <img
          src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-52 object-cover"
        >

        <div class="p-5">

          <h2 class="text-2xl font-bold motorName">
            Kawasaki Ninja ZX25R
          </h2>

          <p class="text-green-400 text-2xl font-bold mt-3 motorPrice">
            Rp 105.000.000
          </p>

          <input
            type="text"
            placeholder="Nama Pembeli"
            class="buyerInput w-full mt-4 p-3 rounded-lg bg-slate-700"
          >

          <div class="flex gap-3 mt-4">

            <button
              onclick="beliMotor(this)"
              class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg w-full"
            >
              Beli
            </button>

            <button
              onclick="editMotor(this)"
              class="bg-yellow-500 hover:bg-yellow-600 px-4 py-2 rounded-lg"
            >
              Edit
            </button>

          </div>

        </div>

      </div>

      <!-- MOTOR 2 -->
      <div class="card bg-slate-800 rounded-2xl overflow-hidden shadow-lg">

        <img
          src="https://images.unsplash.com/photo-1609630875171-b1321377ee65?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-52 object-cover"
        >

        <div class="p-5">

          <h2 class="text-2xl font-bold motorName">
            Yamaha R15
          </h2>

          <p class="text-green-400 text-2xl font-bold mt-3 motorPrice">
            Rp 45.000.000
          </p>

          <input
            type="text"
            placeholder="Nama Pembeli"
            class="buyerInput w-full mt-4 p-3 rounded-lg bg-slate-700"
          >

          <div class="flex gap-3 mt-4">

            <button
              onclick="beliMotor(this)"
              class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg w-full"
            >
              Beli
            </button>

            <button
              onclick="editMotor(this)"
              class="bg-yellow-500 hover:bg-yellow-600 px-4 py-2 rounded-lg"
            >
              Edit
            </button>

          </div>

        </div>

      </div>

      <!-- MOTOR 3 -->
      <div class="card bg-slate-800 rounded-2xl overflow-hidden shadow-lg">

        <img
          src="https://images.unsplash.com/photo-1625047509248-ec889cbff17f?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-52 object-cover"
        >

        <div class="p-5">

          <h2 class="text-2xl font-bold motorName">
            Honda CBR250RR
          </h2>

          <p class="text-green-400 text-2xl font-bold mt-3 motorPrice">
            Rp 75.000.000
          </p>

          <input
            type="text"
            placeholder="Nama Pembeli"
            class="buyerInput w-full mt-4 p-3 rounded-lg bg-slate-700"
          >

          <div class="flex gap-3 mt-4">

            <button
              onclick="beliMotor(this)"
              class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg w-full"
            >
              Beli
            </button>

            <button
              onclick="editMotor(this)"
              class="bg-yellow-500 hover:bg-yellow-600 px-4 py-2 rounded-lg"
            >
              Edit
            </button>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- DATA PEMBELIAN -->
  <section class="max-w-6xl mx-auto p-6">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-lg">

      <h2 class="text-3xl font-bold text-red-400 mb-5">
        Data Pembelian
      </h2>

      <div class="overflow-x-auto">

        <table class="w-full text-left">

          <thead>
            <tr class="border-b border-gray-600">
              <th class="p-3">Nama Motor</th>
              <th class="p-3">Harga</th>
              <th class="p-3">Nama Pembeli</th>
              <th class="p-3">Aksi</th>
            </tr>
          </thead>

          <tbody id="tableBody">

          </tbody>

        </table>

      </div>

      <!-- TOTAL -->
      <div class="mt-6 text-right">

        <h3 class="text-2xl font-bold text-green-400">
          Total Penjualan :
          <span id="totalHarga">Rp 0</span>
        </h3>

      </div>

    </div>

  </section>

  <script>

    let total = 0;

    function formatRupiah(angka){
      return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR'
      }).format(angka);
    }

    // BELI MOTOR
    function beliMotor(button){

      const card = button.closest(".card");

      const namaMotor =
        card.querySelector(".motorName").innerText;

      const hargaText =
        card.querySelector(".motorPrice").innerText;

      const buyerInput =
        card.querySelector(".buyerInput");

      const pembeli = buyerInput.value;

      if(pembeli === ""){
        alert("Masukkan nama pembeli!");
        return;
      }

      const angkaHarga =
        parseInt(hargaText.replace(/[^0-9]/g, ""));

      const tableBody =
        document.getElementById("tableBody");

      const row = document.createElement("tr");

      row.classList.add("border-b", "border-gray-700");

      row.innerHTML = `
        <td class="p-3">${namaMotor}</td>

        <td class="p-3">${hargaText}</td>

        <td class="p-3">${pembeli}</td>

        <td class="p-3 flex gap-2">

          <button
            onclick="editData(this)"
            class="bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded"
          >
            Edit
          </button>

          <button
            onclick="hapusData(this, ${angkaHarga})"
            class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded"
          >
            Hapus
          </button>

        </td>
      `;

      tableBody.appendChild(row);

      total += angkaHarga;

      document.getElementById("totalHarga").innerText =
        formatRupiah(total);

      buyerInput.value = "";
    }

    // EDIT MOTOR
    function editMotor(button){

      const card = button.closest(".card");

      const nama =
        card.querySelector(".motorName");

      const harga =
        card.querySelector(".motorPrice");

      const newNama =
        prompt("Edit nama motor:", nama.innerText);

      const newHarga =
        prompt("Edit harga motor:", harga.innerText);

      if(newNama){
        nama.innerText = newNama;
      }

      if(newHarga){
        harga.innerText = newHarga;
      }
    }

    // EDIT DATA PEMBELIAN
    function editData(button){

      const row = button.closest("tr");

      const namaMotor = row.children[0];
      const harga = row.children[1];
      const pembeli = row.children[2];

      const newMotor =
        prompt("Edit nama motor:", namaMotor.innerText);

      const newHarga =
        prompt("Edit harga:", harga.innerText);

      const newPembeli =
        prompt("Edit nama pembeli:", pembeli.innerText);

      if(newMotor){
        namaMotor.innerText = newMotor;
      }

      if(newHarga){
        harga.innerText = newHarga;
      }

      if(newPembeli){
        pembeli.innerText = newPembeli;
      }
    }

    // HAPUS DATA
    function hapusData(button, harga){

      const row = button.closest("tr");

      total -= harga;

      document.getElementById("totalHarga").innerText =
        formatRupiah(total);

      row.remove();
    }

  </script>

</body>
</html>
