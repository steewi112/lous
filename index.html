<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showroom Motor</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#f3f4f6;
      font-family:Arial, sans-serif;
    }

    .card{
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="bg-black text-white py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold">
        Showroom Motor
      </h1>

      <p class="text-gray-300">
        Data Penjualan Motor
      </p>
    </div>
  </header>

  <!-- FORM -->
  <section class="max-w-7xl mx-auto px-6 mt-10">

    <div class="bg-white p-8 rounded-3xl shadow-lg">

      <h2 class="text-2xl font-bold mb-6">
        Tambah Data Pembeli
      </h2>

      <div class="grid md:grid-cols-4 gap-4">

        <input
          type="text"
          id="namaPembeli"
          placeholder="Nama Pembeli"
          class="border p-4 rounded-xl outline-none focus:ring-2 focus:ring-black"
        >

        <input
          type="text"
          id="namaMotor"
          placeholder="Nama Motor"
          class="border p-4 rounded-xl outline-none focus:ring-2 focus:ring-black"
        >

        <input
          type="number"
          id="hargaMotor"
          placeholder="Harga Motor"
          class="border p-4 rounded-xl outline-none focus:ring-2 focus:ring-black"
        >

        <button
          onclick="tambahData()"
          class="bg-black text-white rounded-xl hover:scale-105 transition"
        >
          Tambah Data
        </button>

      </div>

    </div>

  </section>

  <!-- TABLE -->
  <section class="max-w-7xl mx-auto px-6 mt-10 mb-20">

    <div class="bg-white rounded-3xl shadow-lg overflow-hidden">

      <div class="overflow-x-auto">

        <table class="w-full">

          <thead class="bg-black text-white">

            <tr>
              <th class="p-5 text-left">No</th>
              <th class="p-5 text-left">Nama Pembeli</th>
              <th class="p-5 text-left">Nama Motor</th>
              <th class="p-5 text-left">Harga</th>
              <th class="p-5 text-center">Aksi</th>
            </tr>

          </thead>

          <tbody id="tableData">

          </tbody>

        </table>

      </div>

      <!-- TOTAL -->
      <div class="bg-gray-100 p-6 flex justify-between items-center">

        <h3 class="text-2xl font-bold">
          Total Penjualan
        </h3>

        <p id="totalHarga" class="text-2xl font-bold text-green-600">
          Rp 0
        </p>

      </div>

    </div>

  </section>

  <script>

    let dataMotor = [];
    let editIndex = -1;

    function formatRupiah(angka){
      return "Rp " + Number(angka).toLocaleString("id-ID");
    }

    function tambahData(){

      const namaPembeli = document.getElementById("namaPembeli").value;
      const namaMotor = document.getElementById("namaMotor").value;
      const hargaMotor = document.getElementById("hargaMotor").value;

      if(
        namaPembeli === "" ||
        namaMotor === "" ||
        hargaMotor === ""
      ){
        alert("Isi semua data!");
        return;
      }

      const data = {
        pembeli:namaPembeli,
        motor:namaMotor,
        harga:hargaMotor
      };

      if(editIndex === -1){
        dataMotor.push(data);
      }else{
        dataMotor[editIndex] = data;
        editIndex = -1;
      }

      tampilkanData();

      document.getElementById("namaPembeli").value = "";
      document.getElementById("namaMotor").value = "";
      document.getElementById("hargaMotor").value = "";

    }

    function tampilkanData(){

      const table = document.getElementById("tableData");

      table.innerHTML = "";

      let total = 0;

      dataMotor.forEach((item,index)=>{

        total += Number(item.harga);

        table.innerHTML += `
          <tr class="border-b hover:bg-gray-50">

            <td class="p-5">${index + 1}</td>

            <td class="p-5">
              ${item.pembeli}
            </td>

            <td class="p-5">
              ${item.motor}
            </td>

            <td class="p-5 text-green-600 font-semibold">
              ${formatRupiah(item.harga)}
            </td>

            <td class="p-5 text-center space-x-2">

              <button
                onclick="editData(${index})"
                class="bg-yellow-400 px-4 py-2 rounded-lg hover:scale-105 transition"
              >
                Edit
              </button>

              <button
                onclick="hapusData(${index})"
                class="bg-red-500 text-white px-4 py-2 rounded-lg hover:scale-105 transition"
              >
                Hapus
              </button>

            </td>

          </tr>
        `;
      });

      document.getElementById("totalHarga").innerHTML =
        formatRupiah(total);

    }

    function editData(index){

      const data = dataMotor[index];

      document.getElementById("namaPembeli").value =
        data.pembeli;

      document.getElementById("namaMotor").value =
        data.motor;

      document.getElementById("hargaMotor").value =
        data.harga;

      editIndex = index;

    }

    function hapusData(index){

      dataMotor.splice(index,1);

      tampilkanData();

    }

  </script>

</body>
</html>
